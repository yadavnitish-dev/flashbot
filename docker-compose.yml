version: "3.8"
services:
  postgres:
    image: postgres:16-alpine
    container_name: flashbot-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: flashbot
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    image: ghcr.io/yadavnitish-dev/flashbot:latest
    container_name: web
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/flashbot
    depends_on:
      postgres:
        condition: service_healthy
    restart: always

volumes:
  postgres_data:
